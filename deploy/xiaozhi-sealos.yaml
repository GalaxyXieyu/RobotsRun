apiVersion: v1
kind: ConfigMap
metadata:
  name: xiaozhi-server-config
  namespace: ns-lmgpb9nc
data:
  .config.yaml: |
    server:
      ip: 0.0.0.0
      port: 8000
      http_port: 8003
      vision_explain: https://dkyyznecfvae.sealoshzh.site/mcp/vision/explain
    manager-api:
      url: http://xiaozhi-web:8002/xiaozhi
      secret: 7faf29a2-d427-4a37-a4f9-fe060b408015
    openclaw_hub:
      enabled: true
      bridge_ws_path: /openclaw/bridge/ws
      store_file: /opt/xiaozhi-persistent/openclaw/bridges.json
      default_account: default
      default_peer_id_mode: device
      relay_chat: true
      fallback_to_local_on_error: true
      request_timeout_seconds: 60
      chat_method: xiaozhi.chat
      bind_method: xiaozhi.bindPeerAgent
      session_started_method: xiaozhi.sessionStarted
      session_ended_method: xiaozhi.sessionEnded
      session_events_enabled: true
      switch_agent:
        confirmation_template: "好的，已切换到{agent_name}"
        aliases:
          工作助理: enterprise-news-host
          工作主力: enterprise-news-host
          生活助理: seawind
          生活主力: seawind
    prompt_template: agent-base-prompt.txt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: esp32-server-nginx
  namespace: ns-lmgpb9nc
data:
  nginx.conf: |
    events {}

    http {
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      map $http_x_forwarded_proto $best_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
      }

      upstream xiaozhi_web {
        server xiaozhi-web:8002;
      }

      upstream xiaozhi_runtime_ws {
        server xiaozhi-server:8000;
      }

      upstream xiaozhi_runtime_http {
        server xiaozhi-server:8003;
      }

      server {
        listen 80;
        client_max_body_size 50m;

        location /xiaozhi/v1/ {
          proxy_pass http://xiaozhi_runtime_ws;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $best_forwarded_proto;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }

        location /xiaozhi/ota/ {
          proxy_pass http://xiaozhi_web;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $best_forwarded_proto;
        }

        location /mcp/vision/explain {
          proxy_pass http://xiaozhi_runtime_http;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $best_forwarded_proto;
        }

        location /openclaw/bridge/ws {
          proxy_pass http://xiaozhi_runtime_http;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $best_forwarded_proto;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }

        location /admin/openclaw/ {
          proxy_pass http://xiaozhi_runtime_http;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $best_forwarded_proto;
        }

        location / {
          proxy_pass http://xiaozhi_web;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $best_forwarded_proto;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaozhi-server
  namespace: ns-lmgpb9nc
  labels:
    app: xiaozhi-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xiaozhi-server
  template:
    metadata:
      labels:
        app: xiaozhi-server
    spec:
      containers:
        - name: xiaozhi-server
          image: ghcr.nju.edu.cn/xinnan-tech/xiaozhi-esp32-server:server_latest
          imagePullPolicy: Always
          command: ["python", "app.py"]
          args: []
          env:
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          ports:
            - containerPort: 8000
              name: websocket
            - containerPort: 8003
              name: http
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: xiaozhi-server-config
              mountPath: /opt/xiaozhi-esp32-server/data/.config.yaml
              subPath: .config.yaml
            - name: xiaozhi-openclaw-state
              mountPath: /opt/xiaozhi-persistent
      volumes:
        - name: xiaozhi-server-config
          configMap:
            name: xiaozhi-server-config
        - name: xiaozhi-openclaw-state
          persistentVolumeClaim:
            claimName: xiaozhi-openclaw-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xiaozhi-openclaw-state
  namespace: ns-lmgpb9nc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: openebs-lvmpv
---
apiVersion: v1
kind: Service
metadata:
  name: xiaozhi-server
  namespace: ns-lmgpb9nc
spec:
  selector:
    app: xiaozhi-server
  ports:
    - name: websocket
      port: 8000
      targetPort: 8000
    - name: http
      port: 8003
      targetPort: 8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esp32-server
  namespace: ns-lmgpb9nc
  labels:
    app: esp32-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: esp32-server
  template:
    metadata:
      labels:
        app: esp32-server
    spec:
      containers:
        - name: esp32-server
          image: nginx:1.27-alpine
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: esp32-server-nginx
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: esp32-server-nginx
          configMap:
            name: esp32-server-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: esp32-server-dsporsskoguo
  namespace: ns-lmgpb9nc
spec:
  selector:
    app: esp32-server
  ports:
    - name: http
      port: 80
      targetPort: 80
