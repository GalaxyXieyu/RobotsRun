apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xiaozhi-mysql-data
  namespace: ns-lmgpb9nc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: openebs-lvmpv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xiaozhi-uploadfile
  namespace: ns-lmgpb9nc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: openebs-lvmpv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaozhi-mysql
  namespace: ns-lmgpb9nc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: xiaozhi-mysql
  template:
    metadata:
      labels:
        app: xiaozhi-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: MYSQL_ROOT_PASSWORD
              value: "123456"
            - name: MYSQL_DATABASE
              value: xiaozhi_esp32_server
            - name: MYSQL_INITDB_ARGS
              value: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: xiaozhi-mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: xiaozhi-mysql
  namespace: ns-lmgpb9nc
spec:
  selector:
    app: xiaozhi-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaozhi-redis
  namespace: ns-lmgpb9nc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xiaozhi-redis
  template:
    metadata:
      labels:
        app: xiaozhi-redis
    spec:
      containers:
        - name: redis
          image: redis:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: xiaozhi-redis
  namespace: ns-lmgpb9nc
spec:
  selector:
    app: xiaozhi-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaozhi-web
  namespace: ns-lmgpb9nc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xiaozhi-web
  template:
    metadata:
      labels:
        app: xiaozhi-web
    spec:
      containers:
        - name: web
          image: ghcr.nju.edu.cn/xinnan-tech/xiaozhi-esp32-server:web_latest
          imagePullPolicy: Always
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: SPRING_DATASOURCE_DRUID_URL
              value: jdbc:mysql://xiaozhi-mysql:3306/xiaozhi_esp32_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
            - name: SPRING_DATASOURCE_DRUID_USERNAME
              value: root
            - name: SPRING_DATASOURCE_DRUID_PASSWORD
              value: "123456"
            - name: SPRING_DATA_REDIS_HOST
              value: xiaozhi-redis
            - name: SPRING_DATA_REDIS_PASSWORD
              value: ""
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 8002
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1536Mi
          volumeMounts:
            - name: uploadfile
              mountPath: /uploadfile
          startupProbe:
            tcpSocket:
              port: 8002
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8002
            periodSeconds: 10
      volumes:
        - name: uploadfile
          persistentVolumeClaim:
            claimName: xiaozhi-uploadfile
---
apiVersion: v1
kind: Service
metadata:
  name: xiaozhi-web
  namespace: ns-lmgpb9nc
spec:
  selector:
    app: xiaozhi-web
  ports:
    - name: http
      port: 8002
      targetPort: 8002
